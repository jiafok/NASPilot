version: "3.9"

services:
  naspilot:
    image: ghcr.io/jiafok/naspilot:latest
    pull_policy: always
    container_name: naspilot
    restart: unless-stopped

    ports:
      - "8080:8000"

    volumes:
      # Persistent data (SQLite + logs + configs)
      - ./data:/app/data
      # Optional: separate logs directory (logs now go to /app/data/logs/)
      # - ./logs:/app/logs
      # Docker socket (manage containers)
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Your scripts directory
      - ./scripts:/scripts:ro
      # Docker app backup (read)
      - /volume1/docker:/volume1/docker:ro
      # Docker app backup (write)
      - /volumeUSB1/usbshare/docker_backup:/volumeUSB1/usbshare/docker_backup:rw

    # Optional: rclone mount requires FUSE
    # cap_add:
    #   - SYS_ADMIN
    # devices:
    #   - /dev/fuse:/dev/fuse
    # volumes:
    #   - /path/to/rclone.conf:/app/.config/rclone/rclone.conf:ro

    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/naspilot.db
      - SECRET_KEY=${SECRET_KEY:-change-me-to-a-random-string-at-least-32-chars}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - TZ=Asia/Shanghai
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    networks:
      - naspilot_net

networks:
  naspilot_net:
    driver: bridge
